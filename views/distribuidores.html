<body id="corpo">

    <div class="container">
    <h2 class="h2">DISTRIBUIDORES</h2>

    <h3 class="h2">Filtros:</h3>

        <Label>CNPJ:</Label>
        <input
            type="text"
            id="filtroCnpj"
            placeholder="CNPJ"
        >
        <Label>Razão Social:</Label>
        <input
            type="text"
            id="filtroRazao"
            placeholder="Razão Social"
        >
        <Label>Representante:</Label>
        <input
            type="text"
            id="filtroRepresentante"
            placeholder="Representante"
        >



    <div class="button-group">
<br>
        <button class="button" id="novoDistribuidor">
            Novo Distribuidor
        </button>

        <button class="button" id="novoItem">
            Novo Item
        </button>

        <button class="button" id="administrarItens">
            Administrar Itens
        </button>

    </div>

    <div class="table-container">

        <table class="table" border="1" width="100%">

            <thead>

                <tr>
                    <th>CNPJ</th>
                    <th>Razão Social</th>
                    <th>Representante</th>
                    <th>Ações</th>
                </tr>

            </thead>

            <tbody id="listaDistribuidores">

            </tbody>

        </table>

    </div>

</div>


<div
    id="modalDistribuidor"
    class="modal"
>

    <div class="modal-content">

        <Button
            id="fecharModal"
            class="button"
        >
            ×
        </Button>

        <h2>
            Novo Distribuidor
        </h2>
        <label>Razão Social</label><br>
        <input
            type="text"
            id="razaoSocial"
            placeholder="Razão Social"
            required
        >

        <br><br>

        <label>CNPJ</label><br>
        <input
            type="text"
            id="cnpj"
            placeholder="CNPJ"
            maxlength="18"
        >

        <br><br>
        
        <label>Cidade</label><br>
        <input
            type="text"
            id="cidade"
            placeholder="Cidade"
            required
        >

        <br><br>
        <label>UF</label><br>

        <input
            type="text"
            id="uf"
            placeholder="UF"
            required
        >

        <br><br>
        <label>Numero de Representante</label><br>
        <input
            type="text"
            id="representante"
            placeholder="Número Representante"
            required
        >

        <br><br>

        <button class="button" id="salvarDistribuidor">
            Salvar
        </button>

    </div>

</div>

<div id="modalItem" class="modal">

    <div class="modal-content">

        <Button
            id="fecharModalItem"
            class="button"
        >
            ×
        </Button>
        <h2>Novo Item</h2>
        <label>Código do item</label><br>
        <input
            type="text"
            id="codigoItem"
            maxlength="14"
            placeholder="Código do Item"
        >

        <br><br>
        <label>Descrição</label><br>
        <input
            type="text"
            id="itemDescricao"
            maxlength="125"
            placeholder="Descrição"
        >

        <br><br>



        <label>

            <input
                type="checkbox"
                id="display"
            >

            Display

        </label>


            <input
                type="checkbox"
                id="ativo"
                checked
                class="esconder"
            >

            
<br><br>

        <button id="salvarItem">
            Salvar
        </button>

    </div>

</div>


<script src="/distribuidores.js"></script>
<script src="/theme-toggle.js?v=1783967913316"></script>
<script>
         // Função para limpar dados do usuário e redirecionar para a página de login
        document.getElementById('logoutButton2').addEventListener('click', async () => {
            // Limpa os dados locais
            sessionStorage.clear();
            localStorage.clear();

            // Faz a requisição ao servidor para destruir a sessão
            await fetch('/logout', { method: 'POST' });

            // Limpa cookies manualmente (como precaução)
            document.cookie.split(";").forEach(cookie => {
                document.cookie = cookie.split("=")[0] + "=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/";
            });

            // Redireciona para a página de login
            window.location.href = '/login2';
        });
    </script>
</body>
</html>
