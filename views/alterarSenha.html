<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Alterar Senha</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
}

.container{
max-width:400px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
background:#333;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Alterar Senha</h2>

<input type="password" id="senhaAtual" placeholder="Senha Atual">

<input type="password" id="novaSenha" placeholder="Nova Senha">

<input type="password" id="confirmarSenha" placeholder="Confirmar Nova Senha">

<button onclick="alterarSenha()">Salvar</button>

<p id="msg"></p>

</div>

<script>

async function alterarSenha(){

const senhaAtual=document.getElementById("senhaAtual").value
const novaSenha=document.getElementById("novaSenha").value
const confirmarSenha=document.getElementById("confirmarSenha").value

const response = await fetch('/api/alterar-senha',{

method:'POST',
headers:{'Content-Type':'application/json'},
credentials:'include',

body:JSON.stringify({
senhaAtual,
novaSenha,
confirmarSenha
})

})

const data=await response.json()

document.getElementById("msg").innerText=data.message || data.error

}

</script>

</body>
</html>
