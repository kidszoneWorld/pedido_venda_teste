        >
        <script>
  const telefoneInput = document.getElementById('TelefoneContato');

  telefoneInput.addEventListener('input', (e) => {
    let valor = e.target.value.replace(/\D/g, ''); // Remove tudo que não for dígito
    if (valor.length > 11) valor = valor.slice(0, 11); // Limita a 11 dígitos

    // Aplica a máscara dependendo do tamanho do número
    if (valor.length > 10) {
      // Celular com 9 dígitos: (00) 00000-0000
      valor = valor.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
    } else if (valor.length > 5) {
      // Fixo ou em digitação: (00) 0000-0000
      valor = valor.replace(/^(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
    } else if (valor.length > 2) {
      // Apenas DDD: (00
      valor = valor.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
    } else if (valor.length > 0) {
      // Iniciando: (0
      valor = valor.replace(/^(\d*)/, '($1');
    }

    e.target.value = valor;
  });
</script>

<script>
         // Função para limpar dados do usuário e redirecionar para a página de login
        document.getElementById('logoutButton2').addEventListener('click', async () => {
            // Limpa os dados locais
            sessionStorage.clear();
            localStorage.clear();

            // Faz a requisição ao servidor para destruir a sessão
            await fetch('/logout', { method: 'POST' });

            // Limpa cookies manualmente (como precaução)
            document.cookie.split(";").forEach(cookie => {
                document.cookie = cookie.split("=")[0] + "=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/";
            });

            // Redireciona para a página de login
            window.location.href = '/login2';
        });
    </script>
