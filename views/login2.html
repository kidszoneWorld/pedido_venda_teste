<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="manifest" href="/images/site.webmanifest">
    <link rel="stylesheet" href="/css/login2.css?v=1773334766357">
</head>
<body>
    <form id="loginForm">
        <img class="imagem" src="/images/logo.png" alt="Imagem KidsZone">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required>

        <button type="submit">Entrar</button>
    </form>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                const response = await fetch('/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, senha })
                });

                if (response.redirected) {
    window.location.assign(response.url);
    return;
}

if (response.ok) {
    window.location.assign('/');
    return;
}

const texto = await response.text();
console.error('Resposta do /auth:', response.status, texto);
alert(`Falha no login. Status: ${response.status}`);
            } catch (error) {
                console.error('Erro ao fazer login:', error);
                alert('Erro ao tentar fazer login. Tente novamente.');
            }
        });
    </script>
</body>
</html>
