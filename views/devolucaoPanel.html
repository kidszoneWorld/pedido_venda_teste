<h2>Painel de Devoluções</h2>
<button class="no-print" onclick="exportarExcel()">Exportar Excel</button>
<input type="text" id="filtroDevolucao" placeholder="Nº Devolução">
<input type="text" id="filtroCliente" placeholder="Cliente ou CNPJ">
<input type="text" id="filtroRepresentante" placeholder="Representante">
<input type="text" id="filtroNfVinculada" placeholder="Nº NF Vinculada">
<input type="text" id="filtroNfOrigem" placeholder="Nº NF de Origem">

<select id="filtroStatus">
  <option value="">Todos Status</option>
  <option value="pendente">Pendente</option>
  <option value="aprovado">Aprovado</option>
  <option value="reprovado">Reprovado</option>
</select>

<select id="filtroFinalizado">
  <option value="">Todos</option>
  <option value="1">Finalizado</option>
  <option value="0">Não Finalizado</option>
</select>
<div class="table-container">
<table class="table" border="1" width="100%" id="tabelaDevolucoes">

      <th>N°</th>

</table>

<script>
         // Função para limpar dados do usuário e redirecionar para a página de login
        document.getElementById('logoutButton2').addEventListener('click', async () => {
            // Limpa os dados locais
            sessionStorage.clear();
            localStorage.clear();

            // Faz a requisição ao servidor para destruir a sessão
            await fetch('/logout', { method: 'POST' });

            // Limpa cookies manualmente (como precaução)
            document.cookie.split(";").forEach(cookie => {
                document.cookie = cookie.split("=")[0] + "=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/";
            });

            // Redireciona para a página de login
            window.location.href = '/login2';
        });
    </script>
    </div>
